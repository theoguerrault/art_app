<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#faf8f5" />
		<script>
			(function() {
				try {
					var navLang = window.navigator && window.navigator.language ? window.navigator.language.split('-')[0].toLowerCase() : 'fr';
					if (navLang && /^[a-z]{2}$/.test(navLang)) {
						document.documentElement.setAttribute('lang', navLang);
					}
					var theme = localStorage.getItem('theme') || 'light';
					document.documentElement.setAttribute('data-theme', theme);
					var meta = document.querySelector('meta[name="theme-color"]');
					if (meta) {
						if (theme === 'dark') meta.setAttribute('content', '#0f1117');
						else if (theme === 'light') meta.setAttribute('content', '#faf8f5');
						else {
							var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
							meta.setAttribute('content', isDark ? '#0f1117' : '#faf8f5');
						}
					}
				} catch (e) {}
			})();
		</script>
